Outputs:
  StepFunctionArn:
    Description: ARN of the Patching Step Function
    Value: !Ref PatchingStepFunction
  
  SNSTopicArn:
    Description: ARN of the Patching Alerts SNS Topic
    Value: !Ref PatchingAlertsTopic
  
  S3BucketName:
    Description: Name of the S3 bucket for patch compliance reports
    Value: !Ref PatchComplianceReportsBucket
  
  ScheduleArn1:
    Condition: CreateSchedule1
    Description: "ARN of the schedule created for PatchGroup slot 1"
    Value: !GetAtt Schedule1.Arn
  
  ScheduleArn2:
    Condition: CreateSchedule2
    Description: "ARN of the schedule created for PatchGroup slot 2"
    Value: !GetAtt Schedule2.Arn
  
  ScheduleArn3:
    Condition: CreateSchedule3
    Description: "ARN of the schedule created for PatchGroup slot 3"
    Value: !GetAtt Schedule3.Arn
  
  ScheduleArn4:
    Condition: CreateSchedule4
    Description: "ARN of the schedule created for PatchGroup slot 4"
    Value: !GetAtt Schedule4.Arn
  
  ScheduleArn5:
    Condition: CreateSchedule5
    Description: "ARN of the schedule created for PatchGroup slot 5"
    Value: !GetAtt Schedule5.Arn
  
  DirectInstallTriggerCommand:
    Description: Command to directly trigger the Step Function in install mode
    Value: !Sub |
      aws stepfunctions start-execution --state-machine-arn ${PatchingStepFunction} --input '{"detail":{"PatchGroup":"YOUR_PATCH_GROUP_VALUE","PatchMode":"install"}}' --region ${AWS::Region}
  
  DirectScanTriggerCommand:
    Description: Command to directly trigger the Step Function in scan mode
    Value: !Sub |
      aws stepfunctions start-execution --state-machine-arn ${PatchingStepFunction} --input '{"detail":{"PatchGroup":"YOUR_PATCH_GROUP_VALUE","PatchMode":"scan"}}' --region ${AWS::Region}
  
  ScheduleSetupNote:
    Description: Required post-deployment step for the schedules
    Value: "Each schedule is created DISABLED with a placeholder time (2090-09-09) and PatchMode=YOUR_PATCH_MODE_VALUE. After deployment, edit each schedule to set the real ScheduleExpression, set PatchMode to 'install' or 'scan', then set State to ENABLED."
  
  PatchModeNote:
    Description: Note about PatchMode values
    Value: "To use different patch modes, set PatchMode to 'install' for patching with reboot or 'scan' for scan-only with no reboot."
  
  DynamicPatchGroupNote:
    Description: Note about adding PatchGroups
    Value: "To add another PatchGroup, set the next blank PatchGroupN parameter and update the stack; a new schedule is created without affecting existing (already-edited) schedules."
